<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ミニアプリ ランチャー</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>ミニアプリ ランチャー</h1>
      <p>このリポジトリで公開しているミニアプリ一覧です。</p>
    </header>

    <main>
      <section id="apps-grid" class="apps-grid" aria-live="polite"></section>
      <p id="loading" class="message">アプリ一覧を読み込み中です...</p>
      <p id="error" class="message error" hidden>
        アプリ一覧の読み込みに失敗しました。時間をおいて再読み込みしてください。
      </p>
    </main>

    <template id="app-card-template">
      <article class="app-card">
        <h2 class="app-name"></h2>
        <p class="app-description"></p>
        <p class="app-status"></p>
        <a class="open-button" target="_self">アプリを開く</a>
      </article>
    </template>

    <script src="launcher.js" defer></script>
  </body>
</html>
