<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="次にやる1タスクに集中するシンプルなToDoアプリ" />
    <title>Next One Task</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>次の1タスク</h1>
        <p>いまやることを1つだけ表示します</p>
      </header>

      <section class="card add-task" aria-labelledby="add-task-title">
        <h2 id="add-task-title">タスク追加</h2>
        <form id="task-form" class="task-form">
          <label for="task-input" class="visually-hidden">新しいタスク</label>
          <input id="task-input" name="task" type="text" maxlength="100" placeholder="例: 企画書の見出しを作る" required />
          <button type="submit" class="btn btn-primary">追加</button>
        </form>
      </section>

      <section class="card current-task" aria-labelledby="current-task-title">
        <h2 id="current-task-title">いまの最優先</h2>
        <div id="current-task-content" class="current-task-content">
          <p id="empty-message">未完了タスクはありません 🎉</p>
        </div>
        <button id="done-button" class="btn btn-success" type="button" disabled>完了にする</button>
      </section>

      <section class="card" aria-labelledby="remaining-title">
        <h2 id="remaining-title">残りタスク</h2>
        <ul id="remaining-list" class="task-list"></ul>
      </section>

      <section class="card" aria-labelledby="completed-title">
        <h2 id="completed-title">完了タスク</h2>
        <ul id="completed-list" class="task-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
