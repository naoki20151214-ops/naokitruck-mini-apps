<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI実行ログ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>KPI実行ログ</h1>
      <p>日々のアクションを記録して、達成までを見える化</p>
    </header>

    <main class="container">
      <section id="kpi-list-screen" class="screen active">
        <div class="section-header">
          <h2>KPI一覧</h2>
          <button id="open-kpi-form-btn" class="btn">＋ KPI作成</button>
        </div>

        <form id="kpi-form" class="card form hidden">
          <h3>新しいKPIを作成</h3>
          <label>
            KPI名
            <input type="text" id="kpi-name" required placeholder="例: 月間商談数" />
          </label>
          <label>
            目標値
            <input type="number" id="kpi-target" required min="0" step="any" placeholder="例: 30" />
          </label>
          <label>
            単位
            <input type="text" id="kpi-unit" required placeholder="例: 件" />
          </label>
          <label>
            メモ（任意）
            <textarea id="kpi-memo" rows="2" placeholder="補足があれば入力"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn primary">保存</button>
            <button type="button" id="cancel-kpi-form-btn" class="btn secondary">キャンセル</button>
          </div>
        </form>

        <div id="kpi-list" class="card-list"></div>
      </section>

      <section id="kpi-detail-screen" class="screen">
        <button id="back-btn" class="btn secondary full">← KPI一覧へ戻る</button>
        <article id="kpi-detail" class="card"></article>
      </section>

      <section id="all-history-screen" class="screen active">
        <div class="section-header">
          <h2>全体の完了履歴</h2>
        </div>
        <div id="all-history-list" class="card"></div>
      </section>
    </main>

    <template id="task-row-template">
      <li class="task-row">
        <div>
          <p class="task-title"></p>
          <small class="task-meta"></small>
        </div>
        <button class="btn small primary complete-btn">完了</button>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
